<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      href="favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="favicon/apple-touch-icon.png"
    />
    <link rel="manifest" href="favicon/site.webmanifest" />
    <title>Avi</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="starfield" aria-hidden="true"></div>
    <main class="container">
      <section class="hero" aria-label="Introduction">
        <img
          class="profile"
          src="https://avatars.githubusercontent.com/inspiringsource"
          alt="Profile"
        />

        <h1 data-i18n="name"></h1>

        <h2>
          <span class="type-container">
            <span class="typed-subtitle"></span>
            <span class="cursor"></span>
          </span>
        </h2>

        <div class="language-switch">
          <button id="language-toggle" aria-label="Toggle language"></button>
        </div>

        <p class="intro" data-i18n="paragraph1"></p>
      </section>

      <div class="cards">
        <section class="section" aria-labelledby="what-i-do-heading">
          <h3 id="what-i-do-heading" data-i18n="whatI_do_heading"></h3>
          <ul>
            <li data-i18n="whatI_do_item1"></li>
            <li data-i18n="whatI_do_item2"></li>
            <li data-i18n="whatI_do_item3"></li>
            <li data-i18n="whatI_do_item4"></li>
          </ul>
        </section>

        <section class="section" aria-labelledby="selected-work-heading">
          <h3 id="selected-work-heading" data-i18n="selected_work_heading"></h3>
          <ul class="selected-work-list">
            <li>
              <a
                href="https://github.com/pasteguard"
                target="_blank"
                rel="noopener noreferrer"
                data-i18n="selected_work_item1"
              ></a>
            </li>
            <li>
              <a
                href="https://github.com/inspiringsource/ai-context-map"
                target="_blank"
                rel="noopener noreferrer"
                data-i18n="selected_work_item2"
              ></a>
            </li>
            <li>
              <a
                href="https://github.com/inspiringsource/azure-devops-service-template"
                target="_blank"
                rel="noopener noreferrer"
                data-i18n="selected_work_item3"
              ></a>
            </li>
          </ul>
        </section>
      </div>

      <div class="links">
        <a
          href="https://github.com/inspiringsource"
          target="_blank"
          rel="noopener"
        >
          <img src="logo/github.png" alt="GitHub" />
        </a>
        <a
          href="https://leetcode.com/u/inspiringsource/"
          target="_blank"
          rel="noopener"
        >
          <img src="logo/leetcode.png" alt="LeetCode" />
        </a>
      </div>

      <footer>
        <a
          class="badge-link"
          href="https://github.com/gayanvoice/top-github-users/blob/main/markdown/public_contributions/switzerland.md"
          target="_blank"
          rel="noopener"
        >
          <img
            src="https://github.com/gayanvoice/top-github-users/actions/workflows/action.yml/badge.svg"
            alt="Top GitHub Users CH"
          />
        </a>
        <p class="copyright">COPYRIGHT &copy; 2026</p>
      </footer>
    </main>

    <script src="js/main.js"></script>
  </body>
</html>
