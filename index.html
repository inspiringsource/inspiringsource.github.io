<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      href="favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="favicon/apple-touch-icon.png"
    />
    <link rel="manifest" href="favicon/site.webmanifest" />
    <title>Avi</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        background: #03060d;
      }

      body {
        font-family: Inter, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 20% 20%, rgba(74, 222, 128, 0.05), transparent 28%),
          radial-gradient(circle at 80% 18%, rgba(56, 189, 248, 0.05), transparent 24%),
          radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.035), transparent 32%),
          linear-gradient(180deg, #06080d 0%, #05070b 45%, #030509 100%);
        color: #f8fafc;
        position: relative;
        overflow-x: hidden;
        isolation: isolate;
      }

      .starfield {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 28%, rgba(255, 255, 255, 0.034), transparent 0.9px),
          radial-gradient(circle at 78% 72%, rgba(205, 230, 255, 0.03), transparent 1px),
          radial-gradient(circle at 62% 54%, rgba(255, 255, 255, 0.018), transparent 1.3px);
        background-size: 250px 250px, 320px 320px, 440px 440px;
        opacity: 0.78;
      }

      .starfield::before,
      .starfield::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-repeat: no-repeat;
      }

      .starfield::before {
        background:
          radial-gradient(circle at 24px 28px, rgba(255, 255, 255, 0.78) 0 0.9px, transparent 1.4px),
          radial-gradient(circle at 108px 62px, rgba(220, 235, 255, 0.72) 0 1.1px, transparent 1.7px),
          radial-gradient(circle at 182px 138px, rgba(255, 255, 255, 0.74) 0 0.95px, transparent 1.5px),
          radial-gradient(circle at 62px 196px, rgba(205, 230, 255, 0.68) 0 1px, transparent 1.6px);
        background-size: 240px 240px;
        background-position: 0 0, 0 0, 0 0, 0 120px;
        opacity: 0.58;
        animation: twinkleA 11s ease-in-out infinite alternate;
      }

      .starfield::after {
        background:
          radial-gradient(circle at 164px 54px, rgba(255, 255, 255, 0.54) 0 1.7px, transparent 2.5px),
          radial-gradient(circle at 96px 224px, rgba(214, 234, 255, 0.46) 0 1.45px, transparent 2.25px);
        background-size: 340px 340px;
        background-position: 36px 90px, 180px 160px;
        opacity: 0.34;
        filter: blur(0.18px);
        animation: twinkleB 15s ease-in-out infinite alternate;
      }

      main,
      .container,
      .page-shell,
      .content,
      .hero {
        position: relative;
        z-index: 1;
      }

      .container {
        max-width: 1080px;
        margin: 0 auto;
        padding: 64px 24px 36px;
        text-align: center;
        animation: pageFade 0.7s ease-out;
      }

      .hero {
        max-width: 760px;
        margin: 0 auto;
      }

      img.profile {
        border-radius: 50%;
        width: 164px;
        height: 164px;
        object-fit: cover;
        margin: 0 0 22px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow:
          0 0 0 8px rgba(255, 255, 255, 0.03),
          0 18px 45px rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2.6rem, 7vw, 4.5rem);
        line-height: 1.04;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: #ffffff;
        text-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      }

      h2 {
        margin: 0;
        font-size: clamp(1.05rem, 2.6vw, 1.35rem);
        font-weight: 500;
        color: #e2e8f0;
      }

      p {
        margin: 0;
        line-height: 1.75;
      }

      .intro {
        max-width: 740px;
        margin: 26px auto 0;
        font-size: 1.05rem;
        color: #c5d0df;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 24px;
        margin: 56px auto 0;
        align-items: stretch;
      }

      .section {
        height: 100%;
        display: flex;
        flex-direction: column;
        padding: 28px 28px 26px;
        border-radius: 18px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background:
          linear-gradient(180deg, rgba(15, 23, 42, 0.72), rgba(8, 12, 20, 0.86));
        box-shadow:
          0 14px 36px rgba(0, 0, 0, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
        text-align: left;
        transition:
          transform 0.25s ease,
          border-color 0.25s ease,
          box-shadow 0.25s ease;
      }

      .section:hover {
        transform: translateY(-3px);
        border-color: rgba(94, 234, 212, 0.3);
        box-shadow:
          0 18px 40px rgba(0, 0, 0, 0.34),
          0 0 0 1px rgba(94, 234, 212, 0.06);
      }

      .section h3 {
        margin: 0 0 16px;
        font-size: 1.1rem;
        color: #f8fafc;
      }

      .section ul {
        margin: 0;
        padding-left: 1.2em;
        color: #cbd5e1;
        flex: 1;
      }

      .section li {
        margin-bottom: 0.8em;
        line-height: 1.65;
      }

      .section li:last-child {
        margin-bottom: 0;
      }

      .section li::marker {
        color: #67e8f9;
      }

      .links {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-top: 32px;
        margin-bottom: 0;
        flex-wrap: wrap;
      }

      .links a {
        min-width: 152px;
        min-height: 56px;
        padding: 10px 16px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.24);
        background: rgba(255, 255, 255, 0.761);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
        transition:
          transform 0.2s ease,
          border-color 0.2s ease,
          box-shadow 0.2s ease,
          background-color 0.2s ease;
      }

      .links a:hover {
        transform: translateY(-2px);
        border-color: rgba(103, 232, 249, 0.42);
        background: rgba(202, 202, 202, 0.82);
        box-shadow:
          0 16px 32px rgba(0, 0, 0, 0.28),
          0 0 0 1px rgba(103, 232, 249, 0.08);
      }

      .links a img {
        width: 96px;
        height: 36px;
        display: block;
      }

      .language-switch {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-top: 24px;
        padding: 4px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(8, 12, 20, 0.7);
        box-shadow:
          0 10px 24px rgba(0, 0, 0, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      #language-toggle {
        cursor: pointer;
        padding: 0;
        background: transparent;
        color: #e2e8f0;
        border: 0;
        border-radius: 999px;
        margin: 0;
      }

      .language-toggle-inner {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 2px;
        border-radius: 999px;
      }

      .language-option {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 86px;
        justify-content: center;
        padding: 7px 12px;
        border-radius: 999px;
        color: #94a3b8;
        font-size: 0.88rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        transition:
          background-color 0.2s ease,
          color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .language-option svg {
        width: 1.1em;
        height: 1.1em;
        margin: 0;
        flex-shrink: 0;
      }

      .language-option.active {
        background: rgba(255, 255, 255, 0.08);
        color: #f8fafc;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      }

      .type-container {
        font-size: inherit;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        min-height: 1.5em;
      }

      footer {
        margin-top: 38px;
      }

      .badge-link {
        display: inline-block;
        margin-bottom: 14px;
      }

      .copyright {
        margin-top: 0;
        font-size: 0.95rem;
        color: #7c8aa0;
      }

      .cursor {
        display: inline-block;
        width: 2px;
        height: 1em;
        background-color: currentColor;
        margin-left: 5px;
        animation: blink 0.7s infinite;
      }

      @keyframes pageFade {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes twinkleA {
        0% {
          opacity: 0.48;
        }
        100% {
          opacity: 0.76;
        }
      }

      @keyframes twinkleB {
        0% {
          opacity: 0.34;
        }
        100% {
          opacity: 0.58;
        }
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      @media (max-width: 820px) {
        .container {
          padding-top: 44px;
        }

        .cards {
          grid-template-columns: 1fr;
          gap: 18px;
          margin-top: 34px;
        }
      }

      @media (max-width: 640px) {
        .container {
          padding: 28px 18px 22px;
        }

        img.profile {
          width: 138px;
          height: 138px;
          margin-bottom: 14px;
        }

        .intro {
          font-size: 1rem;
          margin-top: 18px;
        }

        .section {
          padding: 20px 18px;
        }

        .language-switch {
          margin-top: 16px;
        }

        .language-option {
          min-width: 78px;
          padding: 6px 10px;
          font-size: 0.88rem;
        }

        .links a {
          width: 100%;
          max-width: 220px;
        }

        .links {
          gap: 12px;
          margin-top: 24px;
        }

        footer {
          margin-top: 28px;
        }
      }
    </style>
  </head>
  <body>
    <div class="starfield" aria-hidden="true"></div>
    <main class="container">
      <section class="hero" aria-label="Introduction">
        <img
          class="profile"
          src="https://avatars.githubusercontent.com/inspiringsource"
          alt="Profile"
        />

        <h1 data-i18n="name"></h1>

        <h2>
          <span class="type-container">
            <span class="typed-subtitle"></span>
            <span class="cursor"></span>
          </span>
        </h2>

        <div class="language-switch">
          <button id="language-toggle" aria-label="Toggle language"></button>
        </div>

        <p class="intro" data-i18n="paragraph1"></p>
      </section>

      <div class="cards">
        <section class="section" aria-labelledby="what-i-do-heading">
          <h3 id="what-i-do-heading" data-i18n="whatI_do_heading"></h3>
          <ul>
            <li data-i18n="whatI_do_item1"></li>
            <li data-i18n="whatI_do_item2"></li>
            <li data-i18n="whatI_do_item3"></li>
            <li data-i18n="whatI_do_item4"></li>
          </ul>
        </section>

        <section class="section" aria-labelledby="selected-work-heading">
          <h3 id="selected-work-heading" data-i18n="selected_work_heading"></h3>
          <ul>
            <li data-i18n="selected_work_item1"></li>
            <li data-i18n="selected_work_item2"></li>
            <li data-i18n="selected_work_item3"></li>
          </ul>
        </section>
      </div>

      <div class="links">
        <a
          href="https://github.com/inspiringsource"
          target="_blank"
          rel="noopener"
        >
          <img src="logo/github.png" alt="GitHub" />
        </a>
        <a
          href="https://leetcode.com/u/inspiringsource/"
          target="_blank"
          rel="noopener"
        >
          <img src="logo/leetcode.png" alt="LeetCode" />
        </a>
      </div>

      <footer>
        <a
          class="badge-link"
          href="https://github.com/gayanvoice/top-github-users/blob/main/markdown/public_contributions/switzerland.md"
          target="_blank"
          rel="noopener"
        >
          <img
            src="https://github.com/gayanvoice/top-github-users/actions/workflows/action.yml/badge.svg"
            alt="Top GitHub Users CH"
          />
        </a>
        <p class="copyright">COPYRIGHT &copy; 2026</p>
      </footer>
    </main>

    <script>
      const chFlag = `<svg width="1.6em" height="1.6em" viewBox="0 0 512 512" style="vertical-align:middle;margin-right:0.3em;" fill="none" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_221_2)">
<mask id="mask0_221_2" style="mask-type:luminance" maskUnits="userSpaceOnUse" x="0" y="0" width="512" height="512">
<path d="M256 512C397.385 512 512 397.385 512 256C512 114.615 397.385 0 256 0C114.615 0 0 114.615 0 256C0 397.385 114.615 512 256 512Z" fill="white"/>
</mask>
<g mask="url(#mask0_221_2)">
<path d="M0 0H512V512H0V0Z" fill="#D80027"/>
<path d="M389.6 211.5H300.6V122.5H211.5V211.5H122.5V300.5H211.5V389.5H300.5V300.5H389.5L389.6 211.5Z" fill="#EEEEEE"/>
</g>
</g>
<defs>
<clipPath id="clip0_221_2"><rect width="512" height="512" fill="white"/></clipPath>
</defs>
</svg>`;

      const gbFlag = `<svg width="1.6em" height="1.6em" viewBox="0 0 512 512" style="vertical-align:middle;margin-right:0.3em;" fill="none" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_221_9)">
<mask id="mask0_221_9" style="mask-type:luminance" maskUnits="userSpaceOnUse" x="0" y="0" width="512" height="512">
<path d="M256 512C397.385 512 512 397.385 512 256C512 114.615 397.385 0 256 0C114.615 0 0 114.615 0 256C0 397.385 114.615 512 256 512Z" fill="white"/>
</mask>
<g mask="url(#mask0_221_9)">
<path d="M0 0L8 22L0 45V68L32 122L0 176V208L32 256L0 304V336L32 390L0 444V512L22 504L45 512H68L122 480L176 512H208L256 480L304 512H336L390 480L444 512H512L504 490L512 467V444L480 390L512 336V304L480 256L512 208V176L480 122L512 68V0L490 8L467 0H444L390 32L336 0H304L256 32L208 0H176L122 32L68 0H0Z" fill="#EEEEEE"/>
<path d="M336 0V108L444 0H336ZM512 68L404 176H512V68ZM0 176H108L0 68V176ZM68 0L176 108V0H68ZM176 512V404L68 512H176ZM0 444L108 336H0V444ZM512 336H404L512 444V336ZM444 512L336 404V512H444Z" fill="#0052B4"/>
<path d="M0 0V45L131 176H176L0 0ZM208 0V208H0V304H208V512H304V304H512V208H304V0H208ZM467 0L336 131V176L512 0H467ZM176 336L0 512H45L176 381V336ZM336 336L512 512V467L381 336H336Z" fill="#D80027"/>
</g>
</g>
<defs>
<clipPath id="clip0_221_9"><rect width="512" height="512" fill="white"/></clipPath>
</defs>
</svg>`;

      const translations = {
        de: {
          name: "Avi Bobrovsky",
          subtitle: "Informatikstudent | IT-Systeme & Cloud Support",
          paragraph1:
            "Ich bin Informatikstudent an der FHNW und habe praktische Erfahrung in der Betreuung von Produktivsystemen, der Lösung von Incidents sowie im Troubleshooting von Cloud- und Benutzerumgebungen.",
          whatI_do_heading: "Was ich mache",
          whatI_do_item1: "Betreuung und Betrieb von Cloud-Systemen",
          whatI_do_item2:
            "Troubleshooting von Deployment-, Infrastruktur- und Benutzerproblemen",
          whatI_do_item3:
            "Analyse von Ursachen und strukturierte Problemlösung",
          whatI_do_item4: "Fokus auf stabile und zuverlässige Systeme",
          selected_work_heading: "Ausgewählte Arbeiten",
          selected_work_item1:
            "PasteGuard – Local-first Schutz vor sensiblen Copy-Paste-Leaks",
          selected_work_item2:
            "AI Context Map – Navigations- und Kontextwerkzeug für Codebasen",
          selected_work_item3:
            "AWS Architect Prep – strukturierte Aufbereitung von Cloud-Lerninhalten",
        },
        en: {
          name: "Avi Bobrovsky",
          subtitle: "Computer Science Student | IT Systems & Cloud Support",
          paragraph1:
            "I'm a Computer Science student at FHNW with hands-on experience supporting production systems, resolving incidents, and troubleshooting issues across cloud and user environments.",
          whatI_do_heading: "What I do",
          whatI_do_item1: "Support and maintenance of cloud-based systems",
          whatI_do_item2:
            "Troubleshooting deployment, infrastructure, and user issues",
          whatI_do_item3: "Root-cause analysis and structured problem solving",
          whatI_do_item4: "Focus on stable and reliable systems",
          selected_work_heading: "Selected work",
          selected_work_item1:
            "PasteGuard – Local-first protection against sensitive copy-paste leaks",
          selected_work_item2:
            "AI Context Map – navigation and context tooling for codebases",
          selected_work_item3:
            "AWS Architect Prep – structured cloud learning resource",
        },
      };

      let subtitleTypingTimer = null;

      function typeSubtitleOnce(text) {
        const el = document.querySelector(".typed-subtitle");
        if (!el) return;

        if (subtitleTypingTimer) {
          clearTimeout(subtitleTypingTimer);
          subtitleTypingTimer = null;
        }

        el.textContent = "";
        let i = 0;

        (function typeChar() {
          if (i <= text.length) {
            el.textContent = text.slice(0, i);
            i++;
            subtitleTypingTimer = setTimeout(typeChar, 100);
          } else {
            subtitleTypingTimer = null;
          }
        })();
      }

      function setLanguage(lang) {
        const nameEl = document.querySelector('[data-i18n="name"]');
        if (nameEl) nameEl.textContent = translations[lang].name;

        typeSubtitleOnce(translations[lang].subtitle);

        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (key && key !== "name") {
            el.textContent = translations[lang][key] || el.textContent;
          }
        });

        localStorage.setItem("lang", lang);
        document.documentElement.lang = lang;
        document.getElementById("language-toggle").innerHTML = `
          <span class="language-toggle-inner" aria-hidden="true">
            <span class="language-option ${lang === "de" ? "active" : ""}">
              ${chFlag}
              <span>DE</span>
            </span>
            <span class="language-option ${lang === "en" ? "active" : ""}">
              ${gbFlag}
              <span>EN</span>
            </span>
          </span>
        `;
      }

      const defaultLang = "de";
      const savedLang = localStorage.getItem("lang") || defaultLang;

      setLanguage(savedLang);

      document
        .getElementById("language-toggle")
        .addEventListener("click", () => {
          const currentLang = localStorage.getItem("lang") || defaultLang;
          const nextLang = currentLang === "de" ? "en" : "de";
          setLanguage(nextLang);
        });
    </script>
  </body>
</html>
