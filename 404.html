<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#03060d" />
    <title>Page not found | Inspiring Source</title>
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #03060d;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-width: 280px;
        min-height: 100vh;
        margin: 0;
        padding: 32px;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(74, 222, 128, 0.06), transparent 28%),
          radial-gradient(circle at 80% 18%, rgba(56, 189, 248, 0.06), transparent 24%),
          #03060d;
      }

      main {
        width: min(100%, 620px);
        padding: clamp(30px, 7vw, 56px);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 20px;
        background: rgba(8, 12, 20, 0.82);
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.32);
        text-align: center;
      }

      .status {
        margin: 0 0 14px;
        color: #67e8f9;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.25rem, 8vw, 4rem);
        letter-spacing: -0.04em;
        line-height: 1.05;
      }

      p {
        max-width: 48ch;
        margin: 20px auto 0;
        color: #c5d0df;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        min-height: 46px;
        margin-top: 28px;
        padding: 11px 18px;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(103, 232, 249, 0.42);
        border-radius: 10px;
        background: rgba(103, 232, 249, 0.1);
        color: #e8fbff;
        font-weight: 700;
        text-decoration: none;
      }

      a:hover {
        background: rgba(103, 232, 249, 0.16);
      }

      a:focus-visible {
        outline: 3px solid #fbbf24;
        outline-offset: 4px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <main aria-live="polite">
      <p id="page-status" class="status">404</p>
      <h1 id="page-title">Page not found</h1>
      <p id="page-message">
        The page you requested does not exist. Check the address or return to the portfolio.
      </p>
      <a id="page-link" href="/">Return to the portfolio</a>
    </main>

    <script>
      (function () {
        "use strict";

        function redirectPathFor(pathname) {
          switch (pathname) {
            case "/readbooster":
            case "/readbooster/":
              return "/ReadBooster/";
            case "/readbooster/privacy":
            case "/readbooster/privacy/":
              return "/ReadBooster/privacy/";
            default:
              return null;
          }
        }

        var destinationPath = redirectPathFor(window.location.pathname);
        if (!destinationPath) return;

        var destination = new URL(destinationPath, window.location.origin);
        destination.search = window.location.search;
        destination.hash = window.location.hash;

        var canonical = document.createElement("link");
        canonical.rel = "canonical";
        canonical.href = new URL(
          destinationPath,
          "https://inspiringsource.github.io",
        ).href;
        document.head.appendChild(canonical);

        var refresh = document.createElement("meta");
        refresh.httpEquiv = "refresh";
        refresh.content = "0;url=" + destination.href;
        document.head.appendChild(refresh);

        document.title = "Redirecting to ReadBooster";
        document.getElementById("page-status").textContent = "ReadBooster";
        document.getElementById("page-title").textContent = "Redirecting…";
        document.getElementById("page-message").textContent =
          "This lowercase compatibility address now points to the canonical ReadBooster page.";

        var fallbackLink = document.getElementById("page-link");
        fallbackLink.href = destination.href;
        fallbackLink.textContent = "Continue to ReadBooster";

        window.location.replace(destination.href);
      })();
    </script>
  </body>
</html>
